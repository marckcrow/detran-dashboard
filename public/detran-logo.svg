<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1565c0" stroke="#0d47a1" stroke-width="4"/>
  <!-- Road -->
  <rect x="10" y="55" width="100" height="30" rx="3" fill="#37474f"/>
  <!-- Road markings -->
  <rect x="20" y="68" width="15" height="4" rx="2" fill="#fff"/>
  <rect x="52" y="68" width="15" height="4" rx="2" fill="#fff"/>
  <rect x="85" y="68" width="15" height="4" rx="2" fill="#fff"/>
  <!-- Car body -->
  <rect x="30" y="38" width="60" height="22" rx="6" fill="#e53935"/>
  <rect x="35" y="32" width="50" height="14" rx="5" fill="#ef5350"/>
  <!-- Windows -->
  <rect x="38" y="34" width="16" height="9" rx="2" fill="#b3e5fc"/>
  <rect x="66" y="34" width="16" height="9" rx="2" fill="#b3e5fc"/>
  <!-- Wheels -->
  <circle cx="40" cy="62" r="9" fill="#212121"/>
  <circle cx="40" cy="62" r="5" fill="#757575"/>
  <circle cx="80" cy="62" r="9" fill="#212121"/>
  <circle cx="80" cy="62" r="5" fill="#757575"/>
  <!-- Light -->
  <circle cx="88" cy="50" r="4" fill="#ffeb3b"/>
  <!-- Text DETRAN -->
  <text x="60" y="100" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#fff">DETRAN-CE</text>
</svg>
